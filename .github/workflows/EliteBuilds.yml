# This is a basic workflow to help you get started with Actions

name: Elite Builds

# Controls when the workflow will run
on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
  
# Environment Variables
env:
  RELEASE_TYPE: 'stable'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: macos-latest    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Environment Details and clean up
        run: |
          rm -rf Build 10 11 12 Releases canary-release release nikgapps.github.io TempPackages
      
      - name: Checking Java Version
        run: |
          java -version
      
      - name: Initialization and Fetching the Source Code
        run: |
          git config --global http.postBuffer 1048576000
          # Halka açık HTTPS linki ile kaynak kodunu çekiyoruz (SSH gerektirmez)
          git clone --depth=1 https://github.com/nikgapps/ondemand.git
           
      - name: Installing Requirements
        run: |
          python3 -m pip install wheel setuptools testresources
          cd ondemand
          pip3 install -r requirements.txt
          cd ..

      - name: Building Android 12 Elite Builds
        run: |
          cd ondemand
          # Senin dagmar.config dosyanı okuyarak Android 12 GApps derler
          python3 main.py -A 12 -U -e 1 -c
          cd ..

      - name: Upload Custom GApps to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Dagmar-Custom-GApps-Android12
          path: |
            ondemand/out/*.zip
            ondemand/Releases/*.zip
            **/Releases/*.zip
            **/*.zip
